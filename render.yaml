# Render Blueprint (https://render.com/docs/blueprint-spec).
# Deploys the Flask API and the React static site as two independent
# services. Neon Postgres is provisioned separately (Neon isn't a Render
# add-on) -- create the database at neon.tech, then paste its connection
# string into the backend service's DATABASE_URL below.
#
# This file describes *what* to deploy; it does not deploy anything by
# itself. See README.md "Deploying to Render" for the click-by-click steps.

services:
  - type: web
    name: yarnboard-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false # set a real random value in the Render dashboard
      - key: DATABASE_URL
        sync: false # paste your Neon connection string here
      - key: CORS_ORIGINS
        value: https://yarnboard-frontend.onrender.com # update if your frontend URL differs

  - type: web
    name: yarnboard-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://yarnboard-backend.onrender.com # update if your backend URL differs
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
